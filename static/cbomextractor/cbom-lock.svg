<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 52" fill="none">
  <defs>
    <linearGradient id="cbomBodyGrad" x1="3" y1="22" x2="41" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a2535"/>
      <stop offset="100%" stop-color="#0c1118"/>
    </linearGradient>
    <linearGradient id="cbomShackleGrad" x1="11" y1="3" x2="33" y2="3" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Shackle ambient glow -->
  <path d="M11 24V13A11 11 0 0133 13V24" stroke="#14b8a6" stroke-width="9" stroke-linecap="round" opacity="0.07"/>
  <!-- Shackle dark inner (separates from body) -->
  <path d="M11 24V13A11 11 0 0133 13V24" stroke="#0c1118" stroke-width="4" stroke-linecap="round"/>
  <!-- Shackle main stroke (gradient teal) -->
  <path d="M11 24V13A11 11 0 0133 13V24" stroke="url(#cbomShackleGrad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Lock body drop shadow -->
  <rect x="4" y="23" width="38" height="28" rx="6" fill="#14b8a6" opacity="0.06"/>
  <!-- Lock body -->
  <rect x="3" y="22" width="38" height="28" rx="6" fill="url(#cbomBodyGrad)" stroke="#14b8a6" stroke-width="1.5"/>
  <!-- Inner border -->
  <rect x="6" y="25" width="32" height="22" rx="4.5" fill="none" stroke="#1e3040" stroke-width="0.8"/>

  <!-- Keyhole hexagon (pointy-top, radius 4.5, center 22,33) -->
  <polygon
    points="22,28.5 25.9,30.75 25.9,35.25 22,37.5 18.1,35.25 18.1,30.75"
    fill="rgba(20,184,166,0.1)" stroke="#14b8a6" stroke-width="1.3" stroke-linejoin="round"/>
  <!-- Keyhole center circle -->
  <circle cx="22" cy="33" r="2.1" fill="#14b8a6"/>
  <!-- Keyhole slot -->
  <rect x="20.2" y="37" width="3.6" height="7" rx="1.8" fill="#14b8a6"/>

  <!-- Circuit corner accents – top-left -->
  <path d="M7 26h3.5M7 26v3.5" stroke="#14b8a6" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <!-- Circuit corner accents – top-right -->
  <path d="M37 26h-3.5M37 26v3.5" stroke="#14b8a6" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <!-- Circuit corner accents – bottom-left -->
  <path d="M7 46h3.5M7 46v-3.5" stroke="#14b8a6" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <!-- Circuit corner accents – bottom-right -->
  <path d="M37 46h-3.5M37 46v-3.5" stroke="#14b8a6" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
</svg>
