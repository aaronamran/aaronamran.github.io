<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aaronamran</title>
    <link rel="icon" type="image/png" href="redcat.png">
    <link rel="stylesheet" href="terminal/terminal.css">
</head>
<body>
    <div class="container">
        <!-- Terminal area -->
        <main class="terminal-container">
            <div class="terminal-header">
                <div class="terminal-title">
                    <img src="redcat.png" alt="Red Hat" class="redhat-logo">
                    <span class="os-badge">Red Cat</span>
                </div>
                <div class="terminal-controls">
                    <a href="index.html" class="control-btn home-btn" title="Back to Home">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                            <polyline points="9 22 9 12 15 12 15 22"/>
                        </svg>
                        Home
                    </a>
                    <a href="https://ko-fi.com/aaronamran" target="_blank" class="kofi-icon-link" title="Support on Ko-fi">
                        <svg class="kofi-icon-tiny" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M23.881 8.948c-.773-4.085-4.859-4.593-4.859-4.593H.723c-.604 0-.679.798-.679.798s-.082 7.324-.022 11.822c.164 2.424 2.586 2.672 2.586 2.672s8.267-.023 11.966-.049c2.438-.426 2.683-2.566 2.658-3.734 4.352.24 7.422-2.831 6.649-6.916zm-11.062 3.511c-1.246 1.453-4.011 3.976-4.011 3.976s-.121.119-.31.023c-.076-.057-.108-.09-.108-.09-.443-.441-3.368-3.049-4.034-3.954-.709-.965-1.041-2.7-.091-3.71.951-1.01 3.005-1.086 4.363.407 0 0 1.565-1.782 3.468-.963 1.904.82 1.832 3.011.723 4.311zm6.173.478c-.928.116-1.682.028-1.682.028V7.284h1.77s1.971.551 1.971 2.638c0 1.913-.985 2.667-2.059 3.015z"/>
                        </svg>
                        <span>Support on Ko-fi</span>
                    </a>
                    <button class="control-btn help-btn" id="helpBtn" title="Show help">Help</button>
                    <button class="control-btn clear-btn" id="clearBtn" title="Clear terminal">Clear</button>
                    <button class="control-btn reset-btn" id="resetBtn" title="Reset filesystem">Reset</button>
                </div>
            </div>
            
            <div class="terminal-body" id="terminal">
                <div class="terminal-output" id="output">
                    <!-- Welcome message will be added by JavaScript -->
                </div>
                <div class="input-line">
                        <span class="prompt" id="prompt">[root@rhcsa-lab ~]# </span>
                        <input type="text" 
                            id="commandInput" 
                            class="command-input" 
                            autocomplete="off" 
                            spellcheck="false"
                            autofocus>
                </div>
            </div>
        </main>
    </div>

    <!-- Load JavaScript modules -->
    <script src="terminal/filesystem.js"></script>
    
    <!-- Modular Command Modules -->
    <script src="terminal/commands/commands-core.js"></script>
    <script src="terminal/commands/commands-text.js"></script>
    <script src="terminal/commands/commands-files.js"></script>
    <script src="terminal/commands/commands-users.js"></script>
    <script src="terminal/commands/commands-network.js"></script>
    <script src="terminal/commands/commands-system.js"></script>
    <script src="terminal/commands/commands-disk.js"></script>
    <script src="terminal/commands/commands-selinux.js"></script>
    <script src="terminal/commands/commands-process.js"></script>
    <script src="terminal/commands/commands-jobcontrol.js"></script>
    <script src="terminal/commands/commands-kernel.js"></script>
    <script src="terminal/commands/commands-scheduling.js"></script>
    <script src="terminal/commands/commands-packages.js"></script>
    <script src="terminal/commands/commands-containers.js"></script>
    <script src="terminal/commands/commands-editors.js"></script>
    <script src="terminal/commands/commands-advanced.js"></script>
    
    <!-- Main commands aggregator -->
    <script src="terminal/commands.js"></script>
    <script src="terminal/vi/vi.js"></script>
    <script src="terminal/bashinterpreter/lexer.js"></script>
    <script src="terminal/bashinterpreter/parser.js"></script>
    <script src="terminal/bashinterpreter/executor.js"></script>
    <script src="terminal/bashinterpreter/interpreter.js"></script>
    <script src="terminal/terminal.js"></script>
</body>
</html>
