  <style>
    /* Page-specific: no-scroll, flex layout fills viewport */
    .site-frame    { overflow: hidden !important; display: flex; flex-direction: column; height: calc(100vh - 2.5rem); }
    .content-grid  { flex: 1; min-height: 0; overflow: hidden; }
    .posts-col     { overflow-y: auto; overflow-x: hidden; min-height: 0; }
    .sidebar       { overflow-y: auto; }
    /* Posts scrollbar — color follows palette accent */
    .posts-col::-webkit-scrollbar       { width: 5px; }
    .posts-col::-webkit-scrollbar-track { background: transparent; }
    .posts-col::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
    .posts-col::-webkit-scrollbar-thumb:hover { opacity: 0.75; }
    /* Smaller post row typography */
    #posts-list .pd-day   { font-size: 1.6rem; }
    #posts-list .pd-mon   { font-size: 0.75rem; }
    #posts-list .post-date { width: 42px; }
    #posts-list .post-title { font-size: 0.85rem; margin-bottom: 0.3rem; }
    #posts-list .post-excerpt { font-size: 0.75rem; line-height: 1.5; margin-bottom: 0.4rem; }
    #posts-list .post-row { padding-top: 0.85rem; padding-bottom: 0.85rem; cursor: pointer; }
    #posts-list .post-row:first-of-type { padding-top: 0.55rem; }
    #posts-list a.post-row { text-decoration: none; color: inherit; display: flex; }
    #posts-list a.post-row .post-title { color: var(--accent); }
  </style>

    document.getElementById('posts-list').innerHTML = posts.map(p =>
