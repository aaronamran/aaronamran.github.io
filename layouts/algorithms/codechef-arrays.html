{{ define "main" }}
  <style>
    .content-grid { overflow: hidden; }
    .posts-col { overflow-y: auto; min-height: 0; }
    .posts-col::-webkit-scrollbar { width: 5px; }
    .posts-col::-webkit-scrollbar-track { background: transparent; }
    .posts-col::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
    a.post-row { text-decoration: none; color: inherit; cursor: pointer; }
  </style>

  <div class="content-grid">
    <main class="posts-col">
      <a href="/algorithms/codechef/" class="back-link">&larr; CodeChef</a>
      <p class="col-label" style="margin-top:1rem">{{ .Title }}</p>

      {{ range .Pages }}
      <a class="post-row" href="{{ .RelPermalink }}">
        <div class="post-body">
          <h2 class="post-title">{{ .Title }}</h2>
          <div class="post-meta"><span class="post-prog">{{ .Params.prog }}</span></div>
        </div>
      </a>
      {{ end }}

      {{ if not .Pages }}
      <p style="color:var(--text-faint);font-size:0.72rem;margin-top:2rem">No problems solved yet.</p>
      {{ end }}
    </main>
    <aside class="sidebar">
      <div class="sb-block">
        <p class="col-label">Topics</p>
        <div class="cert-badges">
          <span class="cert-tag">Linear Search</span>
          <span class="cert-tag">Searching</span>
          <span class="cert-tag">Traversal</span>
        </div>
      </div>
      <div class="sb-block sb-stats">
        <div class="stat-box"><span class="stat-num">{{ len .Pages }}</span><span class="stat-label">solved</span></div>
        <div class="stat-box"><span class="stat-num">56</span><span class="stat-label">total</span></div>
      </div>
    </aside>
  </div>
{{ end }}
